name: Deploy Backend to GitHub Pages

on:
  push:
    branches: [ main ]
    paths:
      - 'server.js'
      - 'package.json'
      - 'db/**'
      - 'api/**'
      - 'shared/**'
      - '.env*'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Create production build
        run: |
          mkdir -p dist
          cp server.js dist/
          cp -r db dist/
          cp -r api dist/
          cp -r shared dist/
          cp package.json dist/
          cp -r public dist/ || true
          echo "NODE_ENV=production" > dist/.env
          echo "PORT=3000" >> dist/.env
          echo "JWT_SECRET=advik-production-jwt-secret-temporary" >> dist/.env
          echo "DATABASE_FILE=./db.sqlite3" >> dist/.env

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './dist'

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
