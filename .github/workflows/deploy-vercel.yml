name: Deploy to Vercel

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: |
          npm ci
          cd client && npm ci

      - name: Create Vercel configuration
        run: |
          cat > vercel.json << 'EOF'
          {
            "version": 2,
            "builds": [
              {
                "src": "server.js",
                "use": "@vercel/node"
              },
              {
                "src": "client/package.json",
                "use": "@vercel/static-build",
                "config": {
                  "distDir": "dist"
                }
              }
            ],
            "routes": [
              {
                "src": "/api/(.*)",
                "dest": "/server.js"
              },
              {
                "src": "/(.*)",
                "dest": "/client/$1"
              }
            ],
            "env": {
              "NODE_ENV": "production",
              "JWT_SECRET": "advik-production-jwt-secret-temporary",
              "DATABASE_FILE": "./db.sqlite3"
            }
          }
          EOF

      - name: Create API server for Vercel
        run: |
          mkdir -p api
          cat > api/index.js << 'EOF'
          const express = require('express');
          const cors = require('cors');
          const server = require('../server');
          
          const app = express();
          
          // Copy all routes from main server
          app.use(cors({ origin: true, credentials: true }));
          app.use(express.json());
          
          // Mount all routes from the main server
          app._router.stack = server._router.stack.filter(layer => 
            layer.route && layer.route.path !== '/'
          );
          
          // Health check for Vercel
          app.get('/health', (req, res) => {
            res.json({ ok: true, timestamp: new Date().toISOString() });
          });
          
          module.exports = app;
          EOF

      - name: Deploy to Vercel
        uses: amondnet/vercel-action@v20
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.ORG_ID }}
          vercel-project-id: ${{ secrets.PROJECT_ID }}
          vercel-args: '--prod'
          scope: ${{ secrets.ORG_ID }}
